<!-- REUSABLE META TAGS TEMPLATE FOR NEW PAGES -->

<!-- 1. Copy the following block into the <head> of your new page. -->
<!-- 2. Replace the placeholders (e.g., [PAGE_TITLE]) with actual values. -->
<!-- 3. Ensure the og:image and twitter:image URLs are absolute (start with https://) and prefer JPG/PNG for broad app preview support. -->

<!-- SEO Meta Tags -->
<title>[PAGE_TITLE] | Mahalaxmi Developers</title>
<meta name="description" content="[PAGE_DESCRIPTION]" />
<link rel="canonical" href="https://sz.mahalaxmidevelopers.com/[PATH_TO_PAGE]" />

<!-- Open Graph / Facebook / LinkedIn -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Mahalaxmi Developers" />
<meta property="og:url" content="https://sz.mahalaxmidevelopers.com/[PATH_TO_PAGE]" />
<meta property="og:title" content="[PAGE_TITLE] | Mahalaxmi Developers" />
<meta property="og:description" content="[PAGE_DESCRIPTION]" />
<meta property="og:image" content="https://sz.mahalaxmidevelopers.com/[PATH_TO_IMAGE]" />
<meta property="og:image:secure_url" content="https://sz.mahalaxmidevelopers.com/[PATH_TO_IMAGE]" />
<meta property="og:image:type" content="image/jpeg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="[IMAGE_ALT_TEXT]" />
<meta property="og:locale" content="en_IN" />

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:url" content="https://sz.mahalaxmidevelopers.com/[PATH_TO_PAGE]" />
<meta name="twitter:title" content="[PAGE_TITLE] | Mahalaxmi Developers" />
<meta name="twitter:description" content="[PAGE_DESCRIPTION]" />
<meta name="twitter:image" content="https://sz.mahalaxmidevelopers.com/[PATH_TO_IMAGE]" />
<meta name="twitter:image:src" content="https://sz.mahalaxmidevelopers.com/[PATH_TO_IMAGE]" />
<meta itemprop="image" content="https://sz.mahalaxmidevelopers.com/[PATH_TO_IMAGE]" />

<!-- END OF META TAGS TEMPLATE -->
