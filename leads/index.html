<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads Management | Mahalaxmi Developers</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <!-- Login Screen -->
    <div id="loginScreen" class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <img src="../assets/images/mahalaxmi-group-header-logo.svg" alt="Mahalaxmi Logo" width="150">
                <h1>Leads Portal</h1>
                <p>Please enter your credentials to continue</p>
            </div>
            <form id="loginForm">
                <div class="field">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="admin@example.com">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
                <p id="loginError" class="error-msg"></p>
            </form>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboardScreen" class="dashboard-wrapper hidden">
        <header class="dashboard-header">
            <div class="container-fluid">
                <div class="header-inner">
                    <div class="brand">
                        <img src="../assets/images/mahalaxmi-group-header-logo.svg" alt="Logo" height="30">
                        <span>Leads Dashboard</span>
                    </div>
                    <div class="user-actions">
                        <span id="userEmail"></span>
                        <button id="logoutBtn" class="btn btn-sm btn-outline">Logout</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="container-fluid">
                <div class="actions-bar">
                    <div class="search-filters">
                        <input type="text" id="searchInput" placeholder="Search by name, phone, or email...">
                        <select id="statusFilter">
                            <option value="All">All Statuses</option>
                            <option value="New">New</option>
                            <option value="Called">Called</option>
                            <option value="Visited">Visited</option>
                            <option value="Not Closed">Not Closed</option>
                            <option value="Deal Closed">Deal Closed</option>
                        </select>
                    </div>
                    <div class="data-actions">
                        <button id="exportCsvBtn" class="btn btn-secondary">Export to CSV</button>
                        <button id="refreshBtn" class="btn btn-outline">Refresh</button>
                    </div>
                </div>

                <div class="table-container card">
                    <table id="leadsTable">
                        <thead>
                            <tr>
                                <th>Date & Time</th>
                                <th>Source Form</th>
                                <th>Lead Name</th>
                                <th>Phone</th>
                                <th>Email</th>
                                <th>Message</th>
                                <th>Status</th>
                                <th>Comments</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="leadsBody">
                            <!-- Rows will be injected here -->
                        </tbody>
                    </table>
                </div>

                <div class="pagination" id="pagination">
                    <!-- Pagination controls -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Edit Comments -->
    <div id="commentModal" class="modal hidden">
        <div class="modal-content">
            <h3>Update Lead</h3>
            <div id="modalLeadInfo"></div>
            <div class="field">
                <label>Status</label>
                <select id="modalStatusUpdate">
                    <option value="New">New</option>
                    <option value="Called">Called</option>
                    <option value="Visited">Visited</option>
                    <option value="Not Closed">Not Closed</option>
                    <option value="Deal Closed">Deal Closed</option>
                </select>
            </div>
            <div class="field">
                <label>Comments</label>
                <textarea id="modalCommentUpdate" rows="4"></textarea>
            </div>
            <div class="modal-footer">
                <button id="closeModalBtn" class="btn btn-outline">Cancel</button>
                <button id="saveCommentBtn" class="btn btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="ui.js"></script>
</body>
</html>
